[theme]
base = "auto"
primaryColor = "#4f8ef7"
backgroundColor = "#0f172a"
secondaryBackgroundColor = "#1e293b"
textColor = "#ffffff"
font = "sans serif"

[server]
headless = true
enableCORS = false
enableXsrfProtection = false
maxUploadSize = 5

[browser]
gatherUsageStats = false
serverAddress = "localhost"

[runner]
fastReruns = true
enforceSerializableSessionState = false

[client]
showErrorDetails = false
toolbarMode = "minimal"

